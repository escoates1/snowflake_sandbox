# Safe to commit — all values read from environment variables, no secrets here.
# Run dbt commands with: uv run dbt <command> --profiles-dir .
snowflake_sandbox:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', '') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH', '') }}"
      role: "{{ env_var('DBT_ROLE', 'DBT_TRANSFORMATIONS') }}"
      database: DWH_DEV
      warehouse: WH_DEV
      schema: staging
      threads: 4
    test:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', '') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH', '') }}"
      role: "{{ env_var('DBT_ROLE', 'DBT_TRANSFORMATIONS') }}"
      database: DWH_TEST
      warehouse: WH_TEST
      schema: staging
      threads: 4
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', '') }}"
      user: "{{ env_var('SNOWFLAKE_USER', '') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH', '') }}"
      role: "{{ env_var('DBT_ROLE', 'DBT_TRANSFORMATIONS') }}"
      database: DWH_PROD
      warehouse: WH_PROD
      schema: staging
      threads: 4

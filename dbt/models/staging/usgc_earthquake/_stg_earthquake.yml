version: 2

models:
  - name: stg_earthquake__event_classification
    description: >
      Staging model that classifies USGS earthquake events by seismic event
      type, magnitude-measurement method, and a human-readable magnitude band.
      Grain: one row per source event (inherited from usgs_earthquake.earthquakes).

    columns:
      - name: EVENT_ID
        description: Unique identifier for the seismic event.
        data_tests:
          - not_null
          - unique
        
      - name: EVENT_TYPE
        description: Type of seismic event (e.g. earthquake, quarry blast, explosion).
        data_tests:
          - not_null

      - name: MAGNITUDE_TYPE_CODE
        description: Uppercased, trimmed magnitude-method code (e.g. MWW, MB, ML).
        data_tests:
          - not_null

      - name: MAGNITUDE_TYPE_DESC
        description: >
          Human-readable magnitude method. NULL when the code is not one of the
          mapped values in the model's CASE expression.
        data_tests:
          - accepted_values:
              values: ['moment W-phase', 'regional', 'moment', 'body wave',
                       'short-period body wave', 'local']

      - name: MAGNITUDE_BAND
        description: >
          Qualitative magnitude band. NULL for magnitudes outside 5.0–9.9.
        data_tests:
          - accepted_values:
              values: ['Moderate', 'Strong', 'Major', 'Great', 'Extreme']
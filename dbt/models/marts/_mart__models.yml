version: 2

models:
  - name: dim_event_classification
    description: >
      Event-classification dimension for USGS earthquakes. One row per source
      event, carrying seismic event type, magnitude-measurement method, and a
      qualitative magnitude band. Built on stg_earthquake__event_classification.
    config:
      materialized: table
      schema: marts
      tags: ['analysis', 'dimension']
    columns:
      - name: EVENT_CLASS_KEY
        description: Surrogate key for the event classification. Primary key of this dimension.
        data_tests:
          - not_null
          - unique

      - name: EVENT_TYPE
        description: Type of seismic event (e.g. earthquake, quarry blast, explosion).
        data_tests:
          - not_null

      - name: MAGNITUDE_TYPE_CODE
        description: Uppercased, trimmed magnitude-method code (e.g. MWW, MB, ML).
        data_tests:
          - not_null

      - name: MAGNITUDE_TYPE_DESC
        description: >
          Human-readable magnitude method. NULL when the code is not one of the
          mapped values.

      - name: MAGNITUDE_BAND
        description: Qualitative magnitude band. NULL for magnitudes outside 5.0-9.9.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Moderate', 'Strong', 'Major', 'Great', 'Extreme']

      - name: ROW_EFFECTIVE_DATE
        description: Timestamp from which this event classification record is effective (derived from the event time).
        data_tests:
          - not_null

      - name: ROW_EXPIRY_DATE
        description: Timestamp until which this record is effective; 9999-12-31 for the current record.
        data_tests:
          - not_null

      - name: DWH_CREATE_TIMESTAMP
        description: UTC timestamp when this row was built by dbt.
        data_tests:
          - not_null

  - name: dim_date
    description: >
      Calendar date dimension. One row per day, generated from a date spine,
      with ISO calendar attributes and audit timestamps.
      Grain: one row per calendar date.
    config:
      materialized: table
      schema: marts
      tags: ['analysis', 'dimension']
    columns:
      - name: DATE_KEY
        description: Calendar date. Primary key of the dimension.
        data_tests:
          - not_null
          - unique

      - name: DAY_OF_MONTH
        description: Day of the month, 1-31.
        data_tests:
          - not_null

      - name: DAY_NAME
        description: Full weekday name, Monday … Sunday.
        data_tests:
          - not_null

      - name: DAY_OF_WEEK_ISO
        description: ISO day of week, 1 = Monday … 7 = Sunday.
        data_tests:
          - not_null

      - name: IS_WEEKEND
        description: True for Saturday and Sunday.
        data_tests:
          - not_null

      - name: ISO_WEEK
        description: ISO week number.
        data_tests:
          - not_null

      - name: MONTH_NUMBER
        description: Month number, 1-12.
        data_tests:
          - not_null

      - name: MONTH_NAME
        description: Full month name, January … December.
        data_tests:
          - not_null

      - name: QUARTER
        description: Calendar quarter, 1-4.
        data_tests:
          - not_null

      - name: YEAR
        description: Calendar year.
        data_tests:
          - not_null

      - name: YEAR_MONTH
        description: YYYY-MM for easy grouping.
        data_tests:
          - not_null

      - name: DWH_CREATE_TIMESTAMP
        description: Row creation timestamp (UTC).
        data_tests:
          - not_null

  - name: dim_location
    description: >
      Location dimension for USGS earthquake events. Region and country are
      derived from the free-text place via AI_EXTRACT; hemispheres are derived
      from latitude/longitude. SCD Type 1 grain: one current row per location.
      Built on stg_earthquake__location.
    config:
      materialized: table
      schema: marts
      tags: ['analysis', 'dimension']
    columns:
      - name: LOCATION_KEY
        description: Surrogate key hashed from the place text. Primary key of this dimension.
        data_tests:
          - not_null
          - unique

      - name: LOCATION
        description: Human-readable place description from the USGS source (e.g. "10km NE of Ridgecrest, CA").
        data_tests:
          - not_null

      - name: REGION
        description: >
          Region, province, or city extracted from the place text via AI_EXTRACT.
          NULL when the place is too vague (e.g. an ocean or a general direction).

      - name: COUNTRY
        description: >
          Country extracted from the place text via AI_EXTRACT. NULL when no
          recognised country name is present.

      - name: LAT_HEMISPHERE
        description: Latitude hemisphere — N (north) or S (south). NULL on the equator (latitude = 0).
        data_tests:
          - accepted_values:
              arguments:
                values: ['N', 'S']

      - name: LON_HEMISPHERE
        description: Longitude hemisphere — E (east) or W (west). NULL on the prime/antimeridian (longitude = 0).
        data_tests:
          - accepted_values:
              arguments:
                values: ['E', 'W']

      - name: ROW_EFFECTIVE_DATE
        description: Timestamp from which this location record is effective (derived from the event time).
        data_tests:
          - not_null

      - name: ROW_EXPIRY_DATE
        description: Timestamp until which this record is effective; 9999-12-31 for the current record.
        data_tests:
          - not_null

  - name: dim_alert_status
    description: >
      Alert-status dimension for USGS earthquake events, covering PAGER alert
      severity, human-review status, tsunami association, and felt reports.
      Built on stg_earthquake__alert_status.
    config:
      materialized: table
      schema: marts
      tags: ['analysis', 'dimension']
    columns:
      - name: ALERT_STATUS_KEY
        description: >
          Surrogate key hashed from pager alert level, tsunami flag, and
          felt-by-human flag. Primary key of this dimension.
        data_tests:
          - not_null
          - unique

      - name: PAGER_ALERT_LEVEL
        description: Raw USGS PAGER alert level (green, yellow, orange, red). NULL when not provided by the source.

      - name: PAGER_ALERT_RANK
        description: >
          Numeric severity rank derived from PAGER_ALERT_LEVEL (1 = green … 4 = red).
          NULL when the level isn't one of the four recognised values.

      - name: REVIEWED_BY_HUMAN_FLAG
        description: >
          Y when the alert status was human-reviewed, N when automatic.
          NULL when the source status is neither.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Y', 'N']

      - name: TSUNAMI_FLAG
        description: Y when a tsunami was associated with the event, N otherwise.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Y', 'N']

      - name: FELT_BY_HUMAN_FLAG
        description: Y when at least one person reported feeling the event, N otherwise.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Y', 'N']

      - name: ROW_EFFECTIVE_DATE
        description: Timestamp from which this alert status record is effective (derived from the event time).
        data_tests:
          - not_null

      - name: ROW_EXPIRY_DATE
        description: Timestamp until which this record is effective; 9999-12-31 for the current record.
        data_tests:
          - not_null

      - name: DWH_CREATE_TIMESTAMP
        description: UTC timestamp when this row was built by dbt.
        data_tests:
          - not_null

  - name: fact_seismic_event
    description: >
      Seismic event fact table for USGS earthquakes, with foreign keys to the
      date, location, event-classification, and alert-status dimensions plus
      event-level metrics. Built on stg_earthquake__seismic_event with a manual
      SCD Type 1 pattern matching the dimensions. Grain: one row per event_id.
    config:
      materialized: table
      schema: marts
      tags: ['analysis', 'fact']
    columns:
      - name: EVENT_KEY
        description: Surrogate key hashed from EVENT_ID. Primary key of this fact table.
        data_tests:
          - not_null
          - unique

      - name: EVENT_ID
        description: Natural key of the seismic event from the USGS source.
        data_tests:
          - not_null

      - name: DATE_KEY
        description: Foreign key to dim_date — calendar date the event occurred (UTC).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: DATE_KEY

      - name: LOCATION_KEY
        description: Foreign key to dim_location, hashed from the free-text place description.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_location')
                field: LOCATION_KEY

      - name: EVENT_CLASS_KEY
        description: >
          Foreign key to dim_event_classification, hashed from event type,
          magnitude type code, and magnitude band.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_event_classification')
                field: EVENT_CLASS_KEY

      - name: ALERT_STATUS_KEY
        description: >
          Foreign key to dim_alert_status, hashed from pager alert level,
          tsunami flag, and felt-by-human flag.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_alert_status')
                field: ALERT_STATUS_KEY

      - name: EVENT_TIMESTAMP
        description: UTC timestamp the event occurred, converted from the source epoch-millisecond time.
        data_tests:
          - not_null

      - name: EVENT_URL
        description: USGS human-readable event page URL.

      - name: DETAIL_URL
        description: USGS detail feed URL for this event.

      - name: LATITUDE
        description: Event latitude in decimal degrees.

      - name: LONGITUDE
        description: Event longitude in decimal degrees.

      - name: DEPTH_IN_KM
        description: Depth of the event below the surface, in kilometers.

      - name: MAGNITUDE
        description: Event magnitude, measured per the method recorded on dim_event_classification (MAGNITUDE_TYPE_CODE).

      - name: DIRECTION_FROM_PLACE
        description: Compass direction from the named place, parsed from the free-text location (e.g. "NE").

      - name: DISTANCE_FROM_PLACE_KM
        description: Distance from the named place, parsed from the free-text location (e.g. "10 km").

      - name: FELT_COUNT
        description: Number of "Did You Feel It?" responses submitted for the event.

      - name: CDI_MAX
        description: Maximum reported Community Determined Intensity.

      - name: MMI_MAX
        description: Maximum estimated Modified Mercalli Intensity.

      - name: SIGNIFICANCE
        description: USGS significance score for the event.

      - name: NUM_STATIONS
        description: Number of seismic stations used to determine the event location.

      - name: DMIN_DEG
        description: Horizontal distance from the epicenter to the nearest station, in degrees.

      - name: RMS_SEC
        description: Root-mean-square travel time residual, in seconds.

      - name: AZIMUTHAL_GAP_DEG
        description: Largest azimuthal gap between azimuthally adjacent stations, in degrees.

      - name: ROW_EFFECTIVE_DATE
        description: Timestamp from which this event record is effective (derived from the event time).
        data_tests:
          - not_null

      - name: ROW_EXPIRY_DATE
        description: Timestamp until which this record is effective; 9999-12-31 for the current record.
        data_tests:
          - not_null

      - name: DWH_CREATE_TIMESTAMP
        description: UTC timestamp when this row was built by dbt.
        data_tests:
          - not_null

unit_tests:
  - name: test_magnitude_band_boundaries
    description: >
      Checks the MAGNITUDE_BAND CASE statement in dim_event_classification at
      its boundaries — just under 5.0 (NULL), the low edge of Moderate (5.0),
      and the Extreme threshold (9.0+).
    model: dim_event_classification
    given:
      - input: ref('stg_earthquake__event_classification')
        rows:
          - {TYPE: earthquake, MAGTYPE: mww, MAG: 4.9, TIME: 1000}
          - {TYPE: earthquake, MAGTYPE: mww, MAG: 5.0, TIME: 1000}
          - {TYPE: earthquake, MAGTYPE: mww, MAG: 9.5, TIME: 1000}
      - input: ref('magnitude_types')
        rows:
          - {MAGNITUDE_TYPE_CODE: mww, MAGNITUDE_TYPE_DESC: moment W-phase}
    expect:
      rows:
        - {MAGNITUDE_BAND: null}
        - {MAGNITUDE_BAND: Moderate}
        - {MAGNITUDE_BAND: Extreme}

  - name: test_alert_status_flag_derivation
    description: >
      Checks the PAGER_ALERT_RANK, REVIEWED_BY_HUMAN_FLAG, TSUNAMI_FLAG, and
      FELT_BY_HUMAN_FLAG derivations in dim_alert_status, covering both a
      fully-populated alert and an all-NULL/automatic/no-felt-reports case.
    model: dim_alert_status
    given:
      - input: ref('stg_earthquake__alert_status')
        rows:
          - {ALERT: red, STATUS: reviewed, TSUNAMI: 1, FELT: 5, TIME: 1000}
          - {ALERT: null, STATUS: automatic, TSUNAMI: 0, FELT: 0, TIME: 2000}
    expect:
      rows:
        - {PAGER_ALERT_RANK: 4, REVIEWED_BY_HUMAN_FLAG: 'Y', TSUNAMI_FLAG: 'Y', FELT_BY_HUMAN_FLAG: 'Y'}
        - {PAGER_ALERT_RANK: null, REVIEWED_BY_HUMAN_FLAG: 'N', TSUNAMI_FLAG: 'N', FELT_BY_HUMAN_FLAG: 'N'}

  - name: test_direction_distance_regex_parsing
    description: >
      Checks the DIRECTION_FROM_PLACE / DISTANCE_FROM_PLACE_KM REGEXP_SUBSTR
      parsing in fact_seismic_event — a single-letter direction, a
      multi-letter direction (ESE), and a place with no leading distance/
      direction prefix (both NULL).
    model: fact_seismic_event
    given:
      - input: ref('stg_earthquake__seismic_event')
        rows:
          - EVENT_ID: ci37374811
            UNIX_TIMESTAMP: 1699999999999
            EVENT_URL: https://earthquake.usgs.gov/earthquakes/eventpage/ci37374811
            DETAIL_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/detail/ci37374811.geojson
            LATITUDE: 35.7
            LONGITUDE: -117.6
            DEPTH_IN_KM: 8.2
            MAGNITUDE: 4.2
            LOCATION: '10 km NE of Ridgecrest, CA'
            FELT: 12
            CDI: 3.4
            MMI: 4.1
            SIGNIFICANCE: 250
            NUM_STATIONS: 30
            DMIN_DEG: 0.05
            RMS_SEC: 0.2
            AZIMUTHAL_GAP_DEG: 45
            TYPE: earthquake
            MAGTYPE: mww
            ALERT: green
            TSUNAMI: 0
          - EVENT_ID: ak0234abcd
            UNIX_TIMESTAMP: 1700000000000
            EVENT_URL: https://earthquake.usgs.gov/earthquakes/eventpage/ak0234abcd
            DETAIL_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/detail/ak0234abcd.geojson
            LATITUDE: 61.2
            LONGITUDE: -149.9
            DEPTH_IN_KM: 33.0
            MAGNITUDE: 3.8
            LOCATION: '5 km ESE of Home, AK'
            FELT: 0
            CDI: null
            MMI: null
            SIGNIFICANCE: 120
            NUM_STATIONS: 15
            DMIN_DEG: 0.1
            RMS_SEC: 0.3
            AZIMUTHAL_GAP_DEG: 90
            TYPE: earthquake
            MAGTYPE: ml
            ALERT: null
            TSUNAMI: 0
          - EVENT_ID: us7000abcd
            UNIX_TIMESTAMP: 1700000100000
            EVENT_URL: https://earthquake.usgs.gov/earthquakes/eventpage/us7000abcd
            DETAIL_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/detail/us7000abcd.geojson
            LATITUDE: -6.2
            LONGITUDE: 130.5
            DEPTH_IN_KM: 120.0
            MAGNITUDE: 5.6
            LOCATION: 'Banda Sea'
            FELT: 0
            CDI: null
            MMI: null
            SIGNIFICANCE: 400
            NUM_STATIONS: 50
            DMIN_DEG: 2.1
            RMS_SEC: 0.9
            AZIMUTHAL_GAP_DEG: 30
            TYPE: earthquake
            MAGTYPE: mww
            ALERT: null
            TSUNAMI: 0
    expect:
      rows:
        - {DIRECTION_FROM_PLACE: 'NE', DISTANCE_FROM_PLACE_KM: '10 km'}
        - {DIRECTION_FROM_PLACE: 'ESE', DISTANCE_FROM_PLACE_KM: '5 km'}
        - {DIRECTION_FROM_PLACE: null, DISTANCE_FROM_PLACE_KM: null}
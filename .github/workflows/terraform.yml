name: Terraform

# ──────────────────────────────────────────────────────────────────────────────
# WHEN THIS RUNS
#   • On every PR to main   -> run the `plan` job only (read-only preview).
#   • On every push to main -> run `plan`, then a gated `apply` job.
# The `paths` filter means the workflow is skipped entirely unless something
# under terraform/ changed — no point planning infra when only dbt models moved.
# ──────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]

permissions:
  contents: read
  pull-requests: write

# Serialise runs so two state-mutating jobs can never overlap. HCP also locks
# state, but this stops a queued apply from racing a fresh one. cancel-in-progress
# is false on purpose — we never want to kill an apply mid-flight.
concurrency:
  group: terraform-dev
  cancel-in-progress: false

# Variables shared by both jobs. These are the bridge from GitHub Secrets to
# Terraform: a variable named `foo` in variables.tf is fed by env var TF_VAR_foo.
# We deliberately DO NOT set TF_VAR_user or TF_VAR_role — their defaults
# (TERRAFORM_USER / SYSADMIN) are exactly what we want, and TERRAFORM_USER must
# NOT be overwritten with the dbt user's SNOWFLAKE_USER secret.
env:
  TF_VAR_organization_name: ${{ secrets.SNOWFLAKE_ORG }}
  TF_VAR_account_name: ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
  # The key file is created at runtime by the "Write private key" step below.
  TF_VAR_private_key_path: /tmp/rsa_key.p8

jobs:
  # Plan — always runs. Read-only: it never changes Snowflake, it only previews.
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Every `run:` step executes here unless it overrides working-directory.
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      # Recreate the private key on the runner from the base64 secret, exactly
      # like the dbt workflows do. The same key is registered to both Snowflake
      # users, so reusing SNOWFLAKE_PRIVATE_KEY is fine for this solo project.
      - name: Write private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" | base64 -d > /tmp/rsa_key.p8

      # Installs Terraform AND writes an HCP credentials file from the token, so
      # the `cloud {}` block in versions.tf can reach your remote state.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # Formatting gate.
      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      # Connect to the HCP workspace and download providers. -input=false makes
      # Terraform error out instead of hanging if it ever wants to prompt
      - name: Terraform init
        run: terraform init -input=false

      # Static validation of the config (types, references, required args).
      - name: Terraform validate
        run: terraform validate

      # The preview. -no-color keeps the PR comment readable; the `id` lets the
      # next step grab this step's stdout via the setup-terraform wrapper.
      # NOTE: plan output can echo sensitive values — fine for a private repo,
      # but worth remembering before you ever make this repo public.
      - name: Terraform plan
        id: plan
        run: terraform plan -input=false -no-color

      # Post the plan onto the PR so the human approving the later apply has
      # something concrete to review. Only meaningful on PR events.
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const body = `#### Terraform Plan 📖\n\n\`\`\`hcl\n${process.env.PLAN}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  # ────────────────────────────────────────────────────────────────────────────
  # APPLY — runs only after a merge to main, and only after you click "approve".
  # ────────────────────────────────────────────────────────────────────────────
  apply:
    needs: plan                                   # wait for a green plan first
    if: github.event_name == 'push'               # never apply from a PR
    runs-on: ubuntu-latest
    # THIS LINE is the approval gate. The GitHub Environment "snowflake-dev"
    # (which you create in repo Settings -> Environments with yourself as a
    # required reviewer) pauses this job until you approve it in the Actions UI.
    environment: snowflake-dev
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - name: Write private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" | base64 -d > /tmp/rsa_key.p8

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform init -input=false

      # Re-plans against current state, then applies. -auto-approve is safe here
      # because the human approval already happened at the environment gate above.
      # The apply log still prints the full plan before making any change.
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

name: dbt

# ──────────────────────────────────────────────────────────────────────────
# WHEN THIS RUNS
#   • Push to main only, and only when dbt/** changed. There is no
#     pull_request trigger — nothing in this file runs before a merge.
#   • deploy-dev -> deploy-test -> deploy-prod run in strict sequence via
#     `needs:`: each environment only starts after `dbt build` has
#     succeeded in the previous one. deploy-test and deploy-prod are also
#     tied to the `snowflake-test`/`snowflake-prod` GitHub Environments,
#     so if those have required reviewers configured, each pauses for
#     manual approval before it runs.
# ──────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths: ["dbt/**"]

concurrency:
  group: dbt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # First stage of the chain — no `needs:`, this is the entry point.
  # Builds + tests every model against the shared DEV schema.
  deploy-dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_IDENTIFIER }}
      SNOWFLAKE_USER: ${{ secrets.DBT_SERVICE_ACCOUNT }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_key.p8
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH
      DBT_TARGET: dev
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Write private key
        run: echo "${{ secrets.TERRAFORM_PRIVATE_KEY }}" | base64 -d > /tmp/rsa_key.p8

      - run: uv run dbt deps --profiles-dir .

      - name: dbt build (DEV)
        run: uv run dbt build --profiles-dir .

  # Second stage — only starts after deploy-dev succeeds. Pauses for manual
  # approval if the `snowflake-test` GitHub Environment requires a reviewer.
  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: snowflake-test
    defaults:
      run:
        working-directory: dbt
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_IDENTIFIER }}
      SNOWFLAKE_USER: ${{ secrets.DBT_SERVICE_ACCOUNT }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_key.p8
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH
      DBT_TARGET: test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Write private key
        run: echo "${{ secrets.TERRAFORM_PRIVATE_KEY }}" | base64 -d > /tmp/rsa_key.p8

      - run: uv run dbt deps --profiles-dir .

      - name: dbt build (TEST)
        run: uv run dbt build --profiles-dir .

  # Third stage — only starts after deploy-test succeeds. Pauses for manual
  # approval if the `snowflake-prod` GitHub Environment requires a reviewer.
  deploy-prod:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: snowflake-prod
    defaults:
      run:
        working-directory: dbt
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT_IDENTIFIER }}
      SNOWFLAKE_USER: ${{ secrets.DBT_SERVICE_ACCOUNT }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_key.p8
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH
      DBT_TARGET: prod
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Write private key
        run: echo "${{ secrets.TERRAFORM_PRIVATE_KEY }}" | base64 -d > /tmp/rsa_key.p8

      - run: uv run dbt deps --profiles-dir .

      - name: dbt build (PROD)
        run: uv run dbt build --profiles-dir .
